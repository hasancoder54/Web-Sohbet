<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siber Ses Paneli + Teşhis Sistemi</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: #111115;
            --accent-color: #00f5d4;
            --text-main: #f4f4f6;
            --text-muted: #71717a;
            --error-color: #ef4444;
            --warning-color: #f59e0b;
            --success-color: #10b981;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        header {
            margin-bottom: 30px;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }
        #status {
            font-size: 14px;
            color: var(--accent-color);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .control-panel {
            background: var(--panel-bg);
            border: 1px solid #222226;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            text-align: center;
        }
        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0, 245, 212, 0.3);
        }
        button:disabled {
            background-color: var(--text-muted);
            color: var(--bg-color);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .section-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .device-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .device-card {
            background: var(--panel-bg);
            border: 1px solid #1f1f24;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border 0.2s ease;
        }
        .device-card.connected {
            border-color: rgba(0, 245, 212, 0.2);
        }
        .device-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .device-avatar {
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
        }
        .device-card.connected .device-avatar {
            background-color: var(--accent-color);
        }
        .device-name {
            font-size: 15px;
            font-weight: 500;
        }
        .audio-icon {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            width: 20px;
            height: 15px;
            visibility: hidden;
        }
        .audio-bar {
            width: 3px;
            height: 3px;
            background-color: var(--accent-color);
            border-radius: 1px;
            transition: height 0.1s ease;
        }
        .talking .audio-icon {
            visibility: visible;
        }
        .talking .audio-bar:nth-child(1) { animation: bounce 0.5s ease infinite alternate; }
        .talking .audio-bar:nth-child(2) { animation: bounce 0.4s ease infinite alternate 0.1s; }
        .talking .audio-bar:nth-child(3) { animation: bounce 0.6s ease infinite alternate 0.2s; }

        @keyframes bounce {
            0% { height: 3px; }
            100% { height: 15px; }
        }

        .diagnostic-console {
            background-color: #050507;
            border: 1px solid #222226;
            border-radius: 8px;
            padding: 14px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            max-height: 250px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.8);
        }
        .log-line {
            margin: 0;
            line-height: 1.5;
            word-break: break-all;
        }
        .log-time { color: #52525b; margin-right: 6px; }
        .log-info { color: #a1a1aa; }
        .log-success { color: var(--success-color); font-weight: 600; }
        .log-warning { color: var(--warning-color); }
        .log-error { color: var(--error-color); font-weight: 600; }

        #remoteAudios { display: none; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>Siber Ses İstasyonu</h1>
            <div id="status">Sinyal Alınıyor...</div>
        </header>

        <div class="control-panel">
            <button id="joinBtn">Ses Sistemini Başlat ve Odaya Gir</button>
        </div>

        <div class="section-title">Aktif Cihazlar ve Bağlantı Durumları</div>
        <div class="device-list" id="deviceList"></div>

        <div class="section-title">Canlı Sistem Teşhis Günlüğü (Aşırı Detaylı)</div>
        <div class="diagnostic-console" id="diagnosticConsole">
            <p class="log-line log-info"><span class="log-time">[00:00:00]</span>Teşhis sistemi aktif. Olaylar bekleniyor...</p>
        </div>
    </div>

    <div id="remoteAudios"></div>

    <script>
        const socket = io();
        const joinBtn = document.getElementById('joinBtn');
        const statusDiv = document.getElementById('status');
        const deviceListDiv = document.getElementById('deviceList');
        const remoteAudiosContainer = document.getElementById('remoteAudios');
        const diagnosticConsole = document.getElementById('diagnosticConsole');

        let localStream;
        let peers = {};
        let iceQueues = {};
        let allUsers = [];
        let inRoom = false;
        
        // Gelişmiş Ağ Yapılandırması: VPN engellerini delmek için açık kaynaklı ücretsiz TURN sunucuları eklendi
        const rtcConfig = { 
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun.services.mozilla.com' },
                {
                    urls: 'turn:openrelay.metered.ca:443',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                },
                {
                    urls: 'turn:openrelay.metered.ca:80',
                    username: 'openrelayproject',
                    credential: 'openrelayproject'
                }
            ] 
        };

        function addLog(message, type = 'info') {
            const now = new Date();
            const timeStr = `[${now.toTimeString().split(' ')[0]}]`;
            
            const p = document.createElement('p');
            p.className = `log-line log-${type}`;
            p.innerHTML = `<span class="log-time">${timeStr}</span>${message}`;
            
            diagnosticConsole.appendChild(p);
            diagnosticConsole.scrollTop = diagnosticConsole.scrollHeight;
        }

        socket.on('connect', () => {
            statusDiv.innerText = "Sistem Çevrimiçi";
            addLog(`Merkezi soket sunucusuna bağlanıldı. Atanan Benzersiz ID: ${socket.id}`, 'success');
        });

        socket.on('connect_error', (err) => {
            addLog(`Soket sunucusuna bağlanılamadı! Detay: ${err.message}`, 'error');
        });

        socket.on('user-list-update', (users) => {
            allUsers = users;
            addLog(`Aktif cihaz listesi güncellendi. Toplam cihaz sayısı: ${users.length}`, 'info');
            renderDeviceList();
        });

        joinBtn.addEventListener('click', async () => {
            joinBtn.disabled = true;
            statusDiv.innerText = "Mikrofon doğrulanıyor...";
            addLog("Mikrofon donanım erişim isteği tarayıcıya gönderildi...", 'info');

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                statusDiv.innerText = "Ses Odasına Giriş Yapıldı";
                addLog("Mikrofon erişimi başarıyla onaylandı. Ses dalgaları yakalanıyor.", 'success');
                inRoom = true;
                
                socket.emit('join-room');
                addLog("Sunucuya 'join-room' (odaya katılma) sinyali gönderildi.", 'info');
                renderDeviceList();
                setupAudioAnalysis(localStream);
            } catch (err) {
                console.error(err);
                statusDiv.innerText = "Hata: Giriş Başarısız";
                addLog(`Mikrofon erişim hatası: ${err.name} - ${err.message}`, 'error');
                joinBtn.disabled = false;
            }
        });

        socket.on('user-joined-room', (userId) => {
            if (!inRoom) return;
            addLog(`Odaya yeni bir katılımcı girdi: ${userId}. WebRTC el sıkışması başlatılıyor (Oluşturucu Rolü)...`, 'info');
            initiatePeerConnection(userId, true);
        });

        socket.on('signal', async (data) => {
            if (!inRoom) return;
            const { from, signal } = data;

            if (!peers[from]) {
                addLog(`Cihazdan (${from}) ilk sinyal alındı. Alıcı rolünde WebRTC nesnesi kuruluyor...`, 'info');
                initiatePeerConnection(from, false);
            }

            const pc = peers[from];

            if (signal.type === 'offer') {
                addLog(`Cihazdan (${from}) SDP Teklifi (Offer) alındı. Uzak ağ tanımı işleniyor...`, 'info');
                await pc.setRemoteDescription(new RTCSessionDescription(signal))
                    .then(() => addLog(`SDP Teklifi (${from}) başarıyla kaydedildi.`, 'success'))
                    .catch(e => addLog(`SDP Teklifi kaydetme hatası: ${e.message}`, 'error'));

                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('signal', { to: from, signal: answer });
                addLog(`Cihazın teklifine karşılık SDP Cevabı (Answer) üretildi ve gönderildi.`, 'info');
                processIceQueue(from);

            } else if (signal.type === 'answer') {
                addLog(`Gönderdiğimiz teklife karşılık cihazdan (${from}) SDP Cevabı (Answer) alındı. İşleniyor...`, 'info');
                await pc.setRemoteDescription(new RTCSessionDescription(signal))
                    .then(() => addLog(`Cevap SDP verisi (${from}) başarıyla sisteme işlendi.`, 'success'))
                    .catch(e => addLog(`Cevap SDP işleme hatası: ${e.message}`, 'error'));
                processIceQueue(from);

            } else if (signal.candidate) {
                const iceCandidate = new RTCIceCandidate(signal);
                if (pc.remoteDescription && pc.remoteDescription.type) {
                    await pc.addIceCandidate(iceCandidate)
                        .catch(e => addLog(`Anlık ICE adresi ekleme hatası: ${e.message}`, 'warning'));
                } else {
                    if (!iceQueues[from]) iceQueues[from] = [];
                    iceQueues[from].push(iceCandidate);
                    addLog(`Erken gelen ağ adresi (ICE Candidate) el sıkışma bitene kadar kuyruğa alındı.`, 'info');
                }
            }
        });

        socket.on('user-left-room', (userId) => {
            addLog(`Cihaz (${userId}) odadan ayrıldı. Atanan ağ kaynakları temizleniyor.`, 'warning');
            if (peers[userId]) {
                peers[userId].close();
                delete peers[userId];
            }
            if (iceQueues[userId]) delete iceQueues[userId];
            const remoteAudio = document.getElementById(`audio-${userId}`);
            if (remoteAudio) remoteAudio.remove();
            renderDeviceList();
        });

        socket.on('user-speaking-state', (data) => {
            const card = document.getElementById(`user-card-${data.id}`);
            if (card) {
                if (data.isSpeaking) card.classList.add('talking');
                else card.classList.remove('talking');
            }
        });

        function initiatePeerConnection(userId, isInitiator) {
            addLog(`RTCPeerConnection nesnesi yapılandırılıyor. STUN ve TURN röle hatları aktif.`, 'info');
            const pc = new RTCPeerConnection(rtcConfig);
            peers[userId] = pc;

            localStream.getTracks().forEach(track => {
                pc.addTrack(track, localStream);
                addLog(`Kendi mikrofon ses izimiz (${track.kind}) bağlantı hattına yüklendi.`, 'info');
            });

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('signal', { to: userId, signal: event.candidate });
                } else {
                    addLog(`Yerel ağ analizi bitti: Tüm ICE/TURN röle adayları başarıyla toplandı.`, 'info');
                }
            };

            // Canlı Durum Takipçileri
            pc.onconnectionstatechange = () => {
                addLog(`[TEŞHİS] Cihaz (${userId}) ile WebRTC Bağlantı Durumu: ${pc.connectionState.toUpperCase()}`, 
                    pc.connectionState === 'connected' ? 'success' : (pc.connectionState === 'failed' ? 'error' : 'warning'));
            };

            pc.oniceconnectionstatechange = () => {
                addLog(`[AĞ DURUMU] ICE Bağlantı Durumu: ${pc.iceConnectionState.toUpperCase()}`, 'info');
            };

            pc.onsignalingstatechange = () => {
                addLog(`[PROTOKOL] Sinyalleşme Durumu: ${pc.signalingState.toUpperCase()}`, 'info');
            };

            // Ses Akış Kanalını Bağlama
            pc.ontrack = (event) => {
                addLog(`Karşı cihazın ham ses verisi yakalandı!`, 'info');
                let remoteAudio = document.getElementById(`audio-${userId}`);
                if (!remoteAudio) {
                    remoteAudio = document.createElement('audio');
                    remoteAudio.id = `audio-${userId}`;
                    remoteAudio.autoplay = true;
                    remoteAudio.setAttribute('playsinline', 'true');
                    remoteAudiosContainer.appendChild(remoteAudio);
                }
                
                if (!remoteAudio.srcObject) {
                    remoteAudio.srcObject = new MediaStream();
                }
                
                remoteAudio.srcObject.addTrack(event.track);
                addLog(`Ses kanalı medya oynatıcısına bağlandı. Oynatım başlatılıyor...`, 'info');
                
                remoteAudio.play()
                    .then(() => addLog(`Görüşme sağlandı! Sesi duyuyor olmalısınız.`, 'success'))
                    .catch(e => addLog(`Tarayıcı otomatik ses engeline takıldı! Sayfaya dokunarak aşın: ${e.message}`, 'error'));
            };

            if (isInitiator) {
                pc.onnegotiationneeded = async () => {
                    try {
                        addLog("Ağ hattı değişimi algılandı, yeni SDP Teklifi (Offer) üretiliyor...", 'info');
                        const offer = await pc.createOffer();
                        await pc.setLocalDescription(offer);
                        socket.emit('signal', { to: userId, signal: offer });
                    } catch (err) {
                        addLog(`SDP Teklif üretim esnasında iç hata: ${err.message}`, 'error');
                    }
                };
            }
        }

        async function processIceQueue(userId) {
            const pc = peers[userId];
            if (iceQueues[userId] && pc) {
                addLog(`Kuyrukta bekleyen toplam ${iceQueues[userId].length} adet ağ adresi eritiliyor...`, 'info');
                while (iceQueues[userId].length > 0) {
                    const candidate = iceQueues[userId].shift();
                    await pc.addIceCandidate(candidate).catch(e => console.log(e));
                }
            }
        }

        function renderDeviceList() {
            deviceListDiv.innerHTML = "";
            allUsers.forEach(user => {
                const isMe = user.id === socket.id;
                const isConnectedToMe = peers[user.id] || isMe;

                const card = document.createElement('div');
                card.className = `device-card ${isConnectedToMe && inRoom ? 'connected' : ''}`;
                card.id = `user-card-${user.id}`;

                card.innerHTML = `
                    <div class="device-info">
                        <div class="device-avatar"></div>
                        <div class="device-name">${user.name} ${isMe ? '(Sen)' : ''}</div>
                    </div>
                    <div class="audio-icon">
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                        <div class="audio-bar"></div>
                    </div>
                `;
                deviceListDiv.appendChild(card);
            });
        }

        function setupAudioAnalysis(stream) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const source = audioContext.createMediaStreamSource(stream);
            const analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            source.connect(analyser);

            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);

            let lastSpeakingState = false;

            function checkVolume() {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < bufferLength; i++) {
                    sum += dataArray[i];
                }
                let average = sum / bufferLength;
                let isSpeaking = average > 12; 

                if (isSpeaking !== lastSpeakingState) {
                    lastSpeakingState = isSpeaking;
                    const myCard = document.getElementById(`user-card-${socket.id}`);
                    if (myCard) {
                        if (isSpeaking) myCard.classList.add('talking');
                        else myCard.classList.remove('talking');
                    }
                    socket.emit('speaking-state', isSpeaking);
                }
                requestAnimationFrame(checkVolume);
            }
            checkVolume();
        }
    </script>
</body>
</html>
